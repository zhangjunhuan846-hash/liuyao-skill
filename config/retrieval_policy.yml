# 检索策略 v2
# 目标：默认 fresh 隔离、核心古籍优先、现代案例默认禁用、同书去重、未校资料降权。

version: "2026-06-21"

retrieval_policy:
  reset_each_reading: true
  use_previous_cases_by_default: false
  modern_cases_default: false
  misc_untrusted_default: false

  default_sources:
    - knowledge/00_basic_terms
    - knowledge/01_core_classics
    - knowledge/04_conflict_registry
    - knowledge/05_xiangyi_registry
    - knowledge/06_topic_rules

  default_allowed_source_types:
    - core_classic
    - conflict_registry
    - auxiliary_system
    - book_text

  default_blocked_source_types:
    - modern_case
    - misc_untrusted
    - raw_ocr_reference

  source_type_weights:
    core_classic: 1.00
    conflict_registry: 0.92
    auxiliary_system: 0.78
    book_text: 0.68
    raw_ocr_reference: 0.28
    modern_case: 0.35
    misc_untrusted: 0.15

  authority_level_weights:
    A: 1.00
    B: 0.78
    C: 0.45
    D: 0.18

  conditional_sources:
    feifushen:
      trigger:
        - 用神不上卦
        - 伏神
        - 飞神
        - 用户要求飞伏神
      paths:
        - knowledge/02_auxiliary_systems

    liushen_symbolic:
      trigger:
        - 用户要求象意
        - 用户要求六神
        - 需要解释细节象
      paths:
        - knowledge/05_xiangyi_registry
        - knowledge/04_conflict_registry

    topic_rules:
      trigger:
        - 博士申请
        - 科研课题
        - 论文投稿
        - 感情
        - offer
        - 合作
        - 求财
        - 失物
      paths:
        - knowledge/06_topic_rules

    modern_cases:
      trigger:
        - 用户明确要求南山真人
        - 用户要求现代案例派
        - 用户要求卦例复盘
        - 用户要求类案
        - 用户要求参考旧案
      paths:
        - knowledge/03_modern_cases
        - memory/casebook.jsonl

  allow_modern_case_only_when_user_says:
    - "参考南山真人"
    - "现代案例"
    - "卦例复盘"
    - "类案"
    - "参考旧案"

  allow_misc_untrusted_only_when_user_says:
    - "未校资料也列出"
    - "杂项也查"
    - "所有来源都要"

  deduplication:
    max_chunks_per_book: 2
    max_chunks_per_title: 3
    max_same_source_file: 2
    min_text_jaccard_distance: 0.18
    normalize_title_rules:
      - "删除 MinerU_markdown_ 前缀"
      - "删除 pdf 后的 UUID"
      - "合并同书不同 OCR 版本"
      - "同名同卷只保留得分最高的前 2 个 chunk"

  query_expansion:
    yongshen: ["用神", "取用", "六亲", "世应", "主象"]
    strength: ["旺衰", "月建", "日辰", "生扶", "冲克", "空破", "墓绝"]
    moving_lines: ["动爻", "变爻", "化进", "化退", "回头生", "回头克"]
    feifushen: ["伏神", "飞神", "飞伏", "用神不上卦"]
    xiangyi: ["象意", "六神", "爻位", "卦象", "取象"]
    timing: ["应期", "值日", "冲合", "出空", "逢合", "逢冲"]

  fresh_mode_hard_rules:
    must_not_read:
      - memory/casebook.jsonl
      - memory/feedback_log.jsonl
      - memory/incoming_cases/
    must_not_use_source_types_by_default:
      - modern_case
      - misc_untrusted
      - raw_ocr_reference
    required_final_note: "本次为 fresh 模式，未调用历史案例。"

  ranking_formula_note: >
    final_score = keyword_score * source_type_weight * authority_level_weight * quality_weight;
    after ranking, apply title/source-file deduplication before returning passages.

conflict_detection:
  trigger_if:
    - 同一占事出现不同用神
    - 同一用神旺衰判断相反
    - 明现用神与伏神取法相反
    - 动变判断与六神象意相反
    - 古籍规则与现代案例不同
    - 应期候选不一致
  required_output: list_all_schools_with_labels
