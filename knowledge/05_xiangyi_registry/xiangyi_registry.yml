conflict_handling:
  if_symbolic_against_core:
    action: "并列输出"
    required_text: "象意与主结构方向不一致，默认不以象意推翻主结构。"
  if_multiple_symbols_point_same_way:
    action: "可以提升为中等辅助证据"
    condition: "至少两个象意来源同向，且不违背用神、世应、月日、动变。"
  if_only_one_symbol:
    action: "只能作为低置信度提示"
