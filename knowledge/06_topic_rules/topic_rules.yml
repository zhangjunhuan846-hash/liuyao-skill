# liuyao_topic_rules.yml
# 建议放置：knowledge/06_topic_rules/topic_rules.yml
# 作用：按占事类型统一“主用神/辅用神/冲突点/输出要求”。
# 注意：这些是取用和分析框架，不是确定性预测规则。

version: "2026-06-21"
default_rule:
  must_do:
    - "先确定占事类型，再定主用神和辅用神。"
    - "同一问题若存在多种合理取用，必须列出不同取法和冲突点。"
    - "主判断优先看用神、世应、月日、动变、生克制化；象意只补充。"
  confidence_downgrade:
    - "起卦时间、日辰、月建、世应、六亲、动爻缺失时，不得给高置信度。"
    - "只有六神/卦象/爻位支持，而主结构不足时，置信度为低。"

rules:
  love_relationship_general:
    label: "感情/关系总体"
    default_yongshen:
      primary: ["应爻", "世爻"]
      secondary: ["官鬼", "妻财", "父母", "子孙"]
    gender_sensitive_use:
      male_querent: "妻财可作对象用神之一，但仍需看应爻和世应互动。"
      female_querent: "官鬼可作对象用神之一，但仍需看应爻和世应互动。"
      unknown_or_nonbinary: "优先以应爻代表对方，再辅看官鬼/妻财的关系角色。"
    key_relations:
      - "世应相生、相合：互动基础较顺；若合中带克/合绊，则有牵制。"
      - "用神生世：对方/关系因素对求测方有利。"
      - "世生用神：求测方投入较多。"
      - "兄弟旺动介入：竞争、朋友意见、同辈影响或资源分散。"
      - "父母旺而克子孙/压制互动：现实条件、家庭、手续、距离、承诺压力。"
    conflict_points:
      - "有的体系重应爻，有的按男女重财官；必须并列。"
      - "六合不一定成，可能是合绊；冲不一定散，可能是破局后的行动。"
    required_output:
      - "明确：这是关系气氛、推进可能、对方态度，还是复合/分手判断。"
      - "分别列：主结构、对方象、求测方象、阻力、推进条件。"

  love_reconciliation:
    label: "复合/挽回"
    default_yongshen:
      primary: ["应爻", "世爻"]
      secondary: ["原用神：官鬼/妻财", "父母消息", "子孙互动"]
    key_relations:
      - "世应有生合、动来相就：有恢复联系或缓和机会。"
      - "应爻空破、受克、入墓：对方状态弱、回避或关系难落地。"
      - "父母动生合世应：消息、解释、文书/承诺可成为桥梁。"
      - "兄弟/官鬼/妻财作为第三因素旺动：竞争、现实压力或新对象疑虑。"
    conflict_points:
      - "玄武、腾蛇可提示隐情/疑虑，但不得单独断第三者。"
    required_output:
      - "必须区分：会不会联系、态度是否改善、是否能稳定复合。"

  exam_academic_application:
    label: "考试/升学/博士申请/录取"
    default_yongshen:
      primary: ["父母爻"]
      secondary: ["官鬼爻", "世爻", "应爻", "朱雀"]
    interpretation:
      parents: "材料、文书、成绩、证明、论文、申请系统。"
      officer_ghost: "名额、资格、录取权力、评审制度、导师/委员会压力。"
      shi: "申请者自身状态与承载能力。"
      ying: "学校、导师、项目或评审对象。"
    key_relations:
      - "父母旺相生世：材料条件较有力。"
      - "官鬼旺相且不严重克世：名位/资格机会存在。"
      - "父母生官或官生父母：材料与资格体系衔接较好。"
      - "父母空破受克：材料缺项、推荐信/成绩/论文/手续风险。"
      - "官鬼克世过重：竞争压力、门槛高、规则约束强。"
      - "子孙旺动克官：可能发挥轻松，也可能损名位，需按主结构判断。"
    conflict_points:
      - "有的书重父母文书，有的断功名重官鬼；申请类必须父母与官鬼同看。"
    required_output:
      - "分开判断：材料强弱、评审/名额压力、导师/项目态度、时间推进。"
      - "不得只用单一父母爻断录取。"

  career_job_offer:
    label: "工作/岗位/offer/升职"
    default_yongshen:
      primary: ["官鬼爻"]
      secondary: ["父母爻", "妻财爻", "应爻", "世爻"]
    interpretation:
      officer_ghost: "岗位、职位、领导、任命、规则。"
      parents: "合同、简历、手续、公司制度、资质证明。"
      wealth: "薪酬、待遇、实际收益。"
      ying: "公司、面试方、招聘方。"
    key_relations:
      - "官鬼旺而生世/合世：岗位机会较有利。"
      - "父母旺而配合官鬼：流程、合同、材料较顺。"
      - "财爻旺相：待遇或实际收益较明显。"
      - "兄弟旺动克财：竞争强、薪资被压、成本增加。"
      - "官鬼克世过重：岗位压力大、门槛高或被规则压制。"
    required_output:
      - "区分：能否拿到机会、岗位是否适合、待遇如何、压力如何。"

  wealth_business:
    label: "求财/投资/生意/订单"
    default_yongshen:
      primary: ["妻财爻"]
      secondary: ["子孙爻", "兄弟爻", "应爻", "父母爻"]
    interpretation:
      wealth: "收益、现金流、订单、资源。"
      offspring: "生财之源、产品、技术、客户转化。"
      siblings: "竞争、分财、成本、合伙分利。"
      parents: "合同、票据、手续、平台规则。"
    key_relations:
      - "子孙旺而生财：有产品/能力/渠道带来收益。"
      - "财旺生世或合世：收益可及。"
      - "兄弟旺动克财：竞争、破财、成本、分利。"
      - "财爻空破：收益虚、账款不实、承诺落空。"
    required_output:
      - "必须提示：六爻不能替代投资/商业尽调。"

  research_project:
    label: "科研课题/论文/实验/选题"
    default_yongshen:
      primary: ["父母爻", "子孙爻"]
      secondary: ["官鬼爻", "妻财爻", "兄弟爻", "世爻", "应爻"]
    interpretation:
      parents: "文献、方案、论文、数据记录、投稿材料。"
      offspring: "实验结果、模型输出、创新点、可发表产出。"
      officer_ghost: "审稿、导师要求、期刊门槛、规范压力、竞争约束。"
      wealth: "样品、设备、经费、实验资源。"
      siblings: "同方向竞争、重复选题、同门/同行分流。"
    key_relations:
      - "父母旺相：文献/方案/论文材料基础较好。"
      - "子孙旺而生财/生世：产出能力、实验结果或模型输出较有希望。"
      - "官鬼旺而有制：有高标准压力，但可转化为论文质量。"
      - "官鬼过旺克世：审稿/导师/竞争压力过重，执行负担高。"
      - "兄弟旺动：撞车、重复选题、同行竞争、团队资源分散。"
      - "财爻空破：实验资源、样品、经费或设备条件不足。"
    conflict_points:
      - "科研问题不是古籍原生占类，必须明确映射关系，不能硬套功名/求财。"
    required_output:
      - "分开判断：选题价值、数据基础、实验可行性、论文产出、竞争/撞车风险。"
      - "必须给出可验证的现实核验点，例如文献撞车、样品数量、实验误差、导师资源。"

  cooperation_project:
    label: "合作/合伙/项目协作"
    default_yongshen:
      primary: ["应爻", "世爻"]
      secondary: ["兄弟爻", "妻财爻", "父母爻", "官鬼爻"]
    key_relations:
      - "世应相生合：合作基础较好。"
      - "兄弟爻得位不克财：同伴协作有利。"
      - "财爻清楚：利益分配较明确。"
      - "父母爻弱：合同、边界、责任分工不清。"
      - "兄弟旺动克财：分利矛盾、资源争夺。"
    required_output:
      - "必须区分：人是否可靠、项目是否能成、利益是否清楚、责任是否可控。"

  lost_item:
    label: "失物/寻找"
    default_yongshen:
      primary: ["妻财爻"]
      secondary: ["应爻", "世爻", "父母爻", "玄武"]
    key_relations:
      - "财爻旺相不空破：物仍有找回基础。"
      - "财爻入墓/伏藏：在封闭、角落、容器、旧处。"
      - "玄武临财：暗处、水边、包内、隐蔽处，或被他人拿取的疑象；不可直接定偷。"
      - "财爻被合：被夹住、被收纳、被人暂存。"
    required_output:
      - "给出位置候选，不得直接指控具体人员。"

  travel_waiting_person:
    label: "出行/行人/等待消息"
    default_yongshen:
      primary: ["应爻", "用神按人物身份取六亲"]
      secondary: ["父母爻", "朱雀", "驿马如有可靠信息才用"]
    key_relations:
      - "用神动来生合世：人/消息有到达倾向。"
      - "用神空破入墓：迟滞、失联、未落实。"
      - "父母/朱雀动：消息、通知、文书变化。"
    required_output:
      - "必须区分：人到、消息到、事情落实三者。"

  illness_health:
    label: "疾病/身体不适"
    safety_note: "只能作传统文化象意分析和风险提示；不得诊断、不得替代医生。"
    default_yongshen:
      primary: ["世爻", "官鬼爻"]
      secondary: ["子孙爻", "父母爻", "白虎", "腾蛇"]
    interpretation:
      officer_ghost: "病象/压力源。"
      offspring: "缓解、药效、恢复力。"
      parents: "检查、药物、医嘱、报告。"
    key_relations:
      - "子孙旺动克官：问题有缓解象，但需现实医疗确认。"
      - "官鬼旺克世：身体/压力风险较强，只能建议检查。"
      - "父母旺：检查、报告、药物、医疗流程较关键。"
    required_output:
      - "必须建议以正规医疗检查为准。"
      - "不得说具体疾病名称为确定结论。"

  lawsuit_dispute:
    label: "纠纷/诉讼/投诉/冲突"
    default_yongshen:
      primary: ["官鬼爻", "世爻", "应爻"]
      secondary: ["父母爻", "兄弟爻", "白虎", "朱雀"]
    interpretation:
      officer_ghost: "规则、处罚、权威、案件压力。"
      parents: "证据、合同、文书、判据。"
      zhuque: "口舌、陈述、沟通争议。"
      baihu: "强硬冲突、损伤、处罚风险。"
    key_relations:
      - "父母旺生世：证据/文书对己方较有利。"
      - "官鬼克世过重：规则压力、处罚风险。"
      - "世应冲克：对抗明显。"
      - "朱雀/白虎动而克世：口舌与冲突升级风险。"
    required_output:
      - "必须提示不能替代法律意见。"

  house_property:
    label: "房屋/租房/搬家/地产"
    default_yongshen:
      primary: ["父母爻"]
      secondary: ["世爻", "应爻", "妻财爻", "勾陈"]
    key_relations:
      - "父母旺相：房屋/合同/产权条件较稳。"
      - "财爻旺：价格、押金、费用是关键。"
      - "勾陈临父母：房屋、土地、旧问题、手续拖延。"
      - "父母空破受克：合同、房况、手续需核验。"
    required_output:
      - "分开判断：房况、合同、价格、搬迁是否顺。"
